<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07131f" />
    <meta name="description" content="A North Dev cria software, automações e produtos digitais sob medida para negócios que querem avançar com clareza." />
    <meta property="og:title" content="North Dev — Software com direção" />
    <meta property="og:description" content="Produtos digitais, automações e SaaS sob medida." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-cover.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <title>North Dev — Software com direção</title>
  </head>
  <body>
    <script>
      (() => {
        const saved = localStorage.getItem('northdev-theme');
        const dark = saved ? saved === 'dark' : !window.matchMedia('(prefers-color-scheme: light)').matches;
        document.documentElement.classList.toggle('dark', dark);
        document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
